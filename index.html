<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Srinivas Rao N - Portfolio</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;

    body{
        background:#f4f4f4;
    }

    .container{
        width:80%;
        max-width:900px;
        margin:50px auto;
        background:white;
        padding:30px;
        border-radius:10px;
        text-align:center;
        box-shadow:0 0 10px rgba(0,0,0,0.2);
    }

    .profile-img{
        width:180px;
        height:180px;
        border-radius:50%;
        object-fit:cover;
        border:4px solid #0077cc;
    }

        color:#333;
    }

    h3{
        color:#666;
        margin-bottom:25px;
    }

    .links{
        margin-top:20px;
    }

    .links a{
        display:inline-block;
        margin:10px;
        padding:12px 20px;
        background:#0077cc;
        color:white;
        text-decoration:none;
        border-radius:5px;
        transition:0.3s;
    }

    .links a:hover{
        background:#005fa3;
    }

    .about{
        margin-top:25px;
        line-height:1.6;
        color:#444;
    }
</style>

        <p>
